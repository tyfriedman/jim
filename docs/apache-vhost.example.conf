# Example Apache vhost: static Vite build + SPA fallback + reverse proxy to Node API.
# Adjust ServerName, paths, and backend port. Enable: ssl, proxy, proxy_http, rewrite (if not using FallbackResource).

# <VirtualHost *:443>
#   ServerName jim.example.com
#
#   DocumentRoot /var/www/jim/client/dist
#   <Directory /var/www/jim/client/dist>
#     Require all granted
#     Options -Indexes
#     # SPA client-side routes (Apache 2.4.16+)
#     FallbackResource /index.html
#   </Directory>
#
#   ProxyPreserveHost On
#   ProxyPass        /api http://127.0.0.1:3000/api
#   ProxyPassReverse /api http://127.0.0.1:3000/api
#
#   SSLEngine on
#   SSLCertificateFile /path/to/fullchain.pem
#   SSLCertificateKeyFile /path/to/privkey.pem
# </VirtualHost>
